version: v0.3
listeners:
    - name: http-8899
      address: 0.0.0.0
      port: 8899
      timeout: 300s
providers:
    defaults:
        default_model: small
    models:
        - name: small
          provider_model_id: small
          backend_refs:
            - name: primary
              endpoint: host.docker.internal:8001
              protocol: http
              weight: 110
        - name: big
          provider_model_id: big
          backend_refs:
            - name: primary
              endpoint: host.docker.internal:8002
              protocol: http
              weight: 100
routing:
    modelCards:
        - name: small
          modality: text
        - name: big
          modality: text
    signals:
        embeddings:
            - name: Complex Semantic
              threshold: 0.68
              candidates:
                - A user asks to debug an error, diagnose logs, or infer a root cause.
                - A user asks to review, fix, optimize, or reason about code.
                - A user asks for architecture, system design, scalability, reliability, or tradeoff analysis.
                - A user asks for mathematical proof, derivation, or multi-step calculation.
                - A user asks to compare options and justify a recommendation.
                - A user asks to resolve ambiguity, hidden assumptions, contradictions, or edge cases.
                - A user asks to synthesize multiple sources into a decision-ready answer.
                - A user asks to evaluate evidence, methodology, metrics, or causal claims.
                - A user asks for strategic planning with risks, dependencies, milestones, or fallback paths.
                - A user asks a technical question where a shallow answer would likely be wrong.
              aggregation_method: nearest
            - name: Simple Semantic
              threshold: 0.74
              candidates:
                - A user asks for a short definition, synonym, antonym, or meaning of a common term.
                - A user asks for a simple translation.
                - A user asks for a short grammar correction or simple rewrite.
                - A user asks for a one-hop factual answer.
                - A user asks for a brief list without explanation.
                - A user asks for a casual greeting or polite conversational response.
                - A user asks for a one-sentence explanation.
                - A user asks for simple formatting or text cleanup.
                - A user asks for a tiny boilerplate code snippet without debugging, design, or reasoning.
                - A user asks for a low-risk general knowledge answer.
              aggregation_method: nearest
        complexity:
            - name: task_complexity
              threshold: 0.65
              hard:
                candidates:
                    - Solve this by combining constraints across several steps and explain why the obvious shortcut fails.
                    - Given conflicting requirements, identify the trade-offs, choose a solution, and justify it rigorously.
                    - Analyze a scenario where multiple variables interact and derive the likely outcome.
                    - The problem is underspecified; infer missing assumptions, state them, and solve under plausible cases.
                    - The user’s request has hidden ambiguity; disambiguate interpretations and give a robust answer.
                    - Prove or disprove the claim, including edge cases and counterexamples.
                    - Derive the formula from first principles, then apply it to a nontrivial example.
                    - Solve an optimization problem with constraints and explain the reasoning step by step.
                    - Find the bug in a mathematical argument and repair the proof.
                    - Debug a production issue where the symptom appears in one service but the root cause may be upstream.
                    - Review code for subtle concurrency, memory, security, or race-condition bugs.
                    - Given a stack trace and partial logs, infer the most likely root cause and propose a fix.
                    - Refactor a system design to improve latency, reliability, and maintainability without changing behavior.
                    - Design a scalable architecture under strict latency, cost, privacy, and failure-recovery constraints.
                    - Compare distributed-systems approaches and recommend one given workload, consistency, and cost constraints.
                    - Create a migration plan for a legacy system with minimal downtime and rollback safety.
                    - Synthesize documents, detect contradictions, and produce a decision-ready summary.
                    - Extract the core argument from a long technical text and evaluate whether the evidence supports it.
                    - Compare proposals, identify hidden assumptions, and recommend the strongest option.
                    - Create a detailed execution plan with dependencies, risks, milestones, and fallback paths.
                    - Given limited resources and competing goals, prioritize a roadmap and explain the trade-offs.
                    - Build a decision matrix for a complex choice and defend the final recommendation.
                    - Evaluate an experimental design, identify confounders, and suggest a stronger methodology.
                    - Assess whether a causal claim is justified by the available evidence.
                    - Identify misleading premises and answer the corrected version.
                    - Find a hidden contradiction in the user’s assumptions and resolve it.
                    - Answer a deliberately tricky question where a shallow response would be wrong.
                    - Given noisy data and competing hypotheses, determine the most plausible explanation.
                    - Interpret metrics, distinguish correlation from causation, and recommend next steps.
                    - Diagnose why an A/B test result may be invalid despite statistical significance.
              easy:
                candidates:
                    - What is the capital of France?
                    - Convert 5 kilometers to miles.
                    - Summarize this paragraph in one sentence.
                    - What does CPU stand for?
                    - Translate this sentence into Spanish.
                    - List three benefits of exercise.
                    - Who wrote Romeo and Juliet?
                    - What is the boiling point of water?
                    - Sort these numbers from smallest to largest.
                    - Explain photosynthesis in simple terms.
                    - What is the largest planet in the solar system?
                    - Write a short definition of machine learning.
                    - How many days are in a leap year?
                    - Name three programming languages.
                    - What is the square root of 64?
                    - Give an example of a renewable energy source.
                    - What year did World War II end?
                    - Rewrite this sentence to improve grammar.
                    - List the primary colors.
                    - Find the average of these numbers.
                    - What is the main function of the heart?
                    - Generate a simple Python hello world program.
                    - What is the currency of Japan?
                    - Explain what a database is briefly.
                    - Name the continents of the world.
                    - What is 15 percent of 200?
                    - Describe the water cycle briefly.
                    - Who painted the Mona Lisa?
                    - What is the opposite of expansion?
                    - Write a short email confirming a meeting.
                    - Convert this timestamp into a readable date.
                    - What does RAM do in a computer?
                    - Give a synonym for happy.
                    - List common file formats for images.
                    - What is the freezing point of water in Celsius?
    decisions:
        - name: Big Decision
          description: Routes complex, ambiguous, reasoning-heavy, technical, analytical, mathematical, coding, debugging, design, planning, or synthesis prompts to the larger model.
          priority: 100
          rules:
            operator: OR
            conditions:
                - type: embedding
                  name: Complex Semantic
                - type: complexity
                  name: task_complexity:hard
          modelRefs:
            - model: big
              use_reasoning: true
        - name: Small Decision
          description: Routes only high-confidence simple, factual, conversational, translation, definition, grammar, formatting, and low-risk prompts to the smaller model.
          priority: 110
          rules:
            operator: AND
            conditions:
                - type: embedding
                  name: Simple Semantic
                - type: complexity
                  name: task_complexity:easy
          modelRefs:
            - model: small
              use_reasoning: false
global:
    router:
        config_source: file
        auto_model_name: MoM
        include_config_models_in_list: false
        clear_route_cache: true
        streamed_body:
            enabled: false
        model_selection:
            method: knn
            enabled: true
    services:
        api:
            batch_classification: {}
        response_api:
            enabled: true
            store_backend: redis
            ttl_seconds: 86400
            max_responses: 1000
        observability:
            tracing:
                enabled: true
                provider: opentelemetry
                exporter:
                    type: otlp
                    endpoint: vllm-sr-jaeger:4317
                    insecure: true
                sampling:
                    type: always_on
                    rate: 1
                resource:
                    service_name: vllm-sr
                    service_version: v0.3.0
                    deployment_environment: development
            metrics:
                enabled: true
                windowed_metrics:
                    enabled: false
                    model_metrics: false
                    queue_depth_estimation: false
        authz: {}
        ratelimit: {}
        router_replay:
            enabled: true
            store_backend: postgres
            ttl_seconds: 2592000
        startup_status:
            store_backend: file
    stores:
        semantic_cache:
            backend_type: memory
            enabled: true
            max_entries: 1000
            ttl_seconds: 3600
            eviction_policy: fifo
        memory:
            milvus:
                address: ""
                collection: agentic_memory
                dimension: 384
            extraction_batch_size: 10
            default_retrieval_limit: 5
            default_similarity_threshold: 0.7
    integrations:
        tools:
            enabled: false
            top_k: 3
            tools_db_path: config/tools_db.json
            fallback_to_empty: true
        looper:
            endpoint: http://localhost:8899/v1/chat/completions
            timeout_seconds: 1200
    model_catalog:
        embeddings:
            semantic:
                qwen3_model_path: ""
                gemma_model_path: ""
                mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
                bert_model_path: ""
                use_cpu: true
                embedding_config:
                    model_type: mmbert
                    preload_embeddings: true
                    target_dimension: 768
                    target_layer: 22
                    enable_soft_matching: true
                    top_k: 1
                    min_score_threshold: 0.5
        system:
            prompt_guard: models/mmbert32k-jailbreak-detector-merged
            domain_classifier: models/mmbert32k-intent-classifier-merged
            pii_classifier: models/mmbert32k-pii-detector-merged
            fact_check_classifier: models/mmbert32k-factcheck-classifier-merged
            hallucination_detector: models/mom-halugate-detector
            hallucination_explainer: models/mom-halugate-explainer
            feedback_detector: models/mmbert32k-feedback-detector-merged
        kbs:
            - name: privacy_kb
              source:
                path: knowledge_bases/privacy/
                manifest: labels.json
              threshold: 0.55
              label_thresholds:
                prompt_injection: 0.7
              groups:
                frontier_reasoning:
                    - architecture_analysis
                    - root_cause_analysis
                    - multi_step_tradeoffs
                local_standard:
                    - generic_coding
                    - simple_task
                    - general_knowledge
                privacy_policy:
                    - proprietary_code
                    - internal_document
                    - pii
                    - business_strategy
                    - trade_secret_ip
                    - operational_infrastructure
                    - locality_directive
                    - customer_data
                private:
                    - prompt_injection
                    - credential_exfiltration
                    - jailbreak_role
                    - system_prompt_extraction
                    - proprietary_code
                    - internal_document
                    - pii
                    - business_strategy
                    - trade_secret_ip
                    - operational_infrastructure
                    - locality_directive
                    - customer_data
                public:
                    - architecture_analysis
                    - root_cause_analysis
                    - multi_step_tradeoffs
                    - generic_coding
                    - simple_task
                    - general_knowledge
                security_containment:
                    - prompt_injection
                    - credential_exfiltration
                    - jailbreak_role
                    - system_prompt_extraction
              metrics:
                - name: private_vs_public
                  type: group_margin
                  positive_group: private
                  negative_group: public
            - name: mmlu_kb
              source:
                path: knowledge_bases/mmlu/
                manifest: labels.json
              threshold: 0.25
              groups:
                escalate:
                    - biology
                    - business
                    - computer science
                    - economics
                    - history
                    - math
                    - other
                    - philosophy
                    - psychology
                keep:
                    - chemistry
                    - engineering
                    - health
                    - law
                    - physics
              metrics:
                - name: escalate_vs_keep
                  type: group_margin
                  positive_group: escalate
                  negative_group: keep
        modules:
            prompt_compression:
                enabled: false
                max_tokens: 0
            prompt_guard:
                enabled: true
                model_id: ""
                threshold: 0.7
                use_cpu: true
                use_modernbert: false
                use_mmbert_32k: true
                jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
                model_ref: prompt_guard
            classifier:
                domain:
                    model_id: ""
                    threshold: 0.5
                    use_cpu: true
                    use_modernbert: false
                    use_mmbert_32k: true
                    category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
                    model_ref: domain_classifier
                mcp:
                    enabled: false
                    transport_type: ""
                    threshold: 0
                pii:
                    model_id: ""
                    threshold: 0.9
                    use_cpu: true
                    use_mmbert_32k: true
                    pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
                    model_ref: pii_classifier
                preference:
                    use_contrastive: true
            complexity:
                prototype_scoring:
                    enabled: true
                    cluster_similarity_threshold: 0.9
                    max_prototypes: 8
                    best_weight: 0.75
                    top_m: 2
            hallucination_mitigation:
                fact_check:
                    model_id: ""
                    threshold: 0.6
                    use_cpu: true
                    use_mmbert_32k: true
                    model_ref: fact_check_classifier
                detector:
                    model_id: ""
                    threshold: 0.8
                    use_cpu: true
                    min_span_length: 2
                    min_span_confidence: 0.6
                    context_window_size: 50
                    enable_nli_filtering: true
                    nli_entailment_threshold: 0.75
                    model_ref: hallucination_detector
                explainer:
                    model_id: ""
                    threshold: 0.9
                    use_cpu: true
                    model_ref: hallucination_explainer
            feedback_detector:
                enabled: true
                model_id: ""
                threshold: 0.7
                use_cpu: true
                use_modernbert: false
                use_mmbert_32k: true
                feedback_mapping_path: ""
                model_ref: feedback_detector
            modality_detector:
                enabled: false
